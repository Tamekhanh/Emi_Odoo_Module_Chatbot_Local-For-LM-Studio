version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - emi_network

  odoo:
    image: odoo:17.0
    depends_on:
      - db
    ports:
      - "8069:8069"
    volumes:
      - odoo_data:/var/lib/odoo
      - ./custom_addons:/mnt/extra-addons
    environment:
      - HOST=db
      - USER=${POSTGRES_USER}
      - PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - emi_network

  chatbot:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - odoo
    networks:
      - emi_network
    # Cho phép chatbot gọi LM Studio chạy trên máy host
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  emi_network:
    driver: bridge

volumes:
  postgres_data:
  odoo_data: